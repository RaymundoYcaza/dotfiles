# smb.conf — Configuración Samba para compartir disco externo
# ===========================================================
# Template versionado en Git. Aplicado por scripts/samba-setup.sh
#
# Comparte el disco /mnt/disc-a00 con Windows en la red local.
# Las PCs Windows se conectan con:
#   Ruta: \\192.168.100.81\disc-a00
#   Usuario: inorizonti
#   Password: (configurado en samba-setup.sh)
#
# Para cambiar el password:
#   sudo smbpasswd inorizonti

[global]
   workgroup = WORKGROUP
   server string = Omarchy Server
   netbios name = OMARCHY-SERVER
   security = user
   map to guest = Bad User
   server signing = mandatory
   smb encrypt = disabled
   
   # Logging
   log file = /var/log/samba/%m.log
   max log size = 50
   
   # Rendimiento
   socket options = TCP_NODELAY IPTOS_LOWDELAY
   read raw = yes
   write raw = yes
   
   # Compatibilidad Windows
   min protocol = SMB2
   max protocol = SMB3

# ─── Share principal: disco externo ──────────────────────────────────────

[disc-a00]
   comment = Disco externo 3.6TB
   path = /mnt/disc-a00
   browseable = yes
   read only = no
   guest ok = no
   valid users = inorizonti
   create mask = 0777
   directory mask = 0777
   force user = jabes
   force group = jabes
